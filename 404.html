<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';">
  <title>Page Not Found</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body{display:grid;place-items:center;min-height:100vh;margin:0;background:linear-gradient(135deg,#f8fafc,#ffffff);}
    .not-found{max-width:720px;padding:2rem;text-align:center;}
    .not-found h1{font-size:clamp(2rem,6vw,4rem);color:#1e293b;margin-bottom:1rem;}
    .not-found p{margin-bottom:1.5rem;}
    .not-found a{display:inline-flex;padding:.875rem 1.5rem;border-radius:999px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:600;}
  </style>
</head>
<body>
  <main class="not-found">
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has moved.</p>
    <a href="/">Return Home</a>
  </main>
</body>
</html>
